<style>.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }@keyframes subtle-pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 3s ease-in-out infinite;
        }@keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }@keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 1s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
        .delay-700 { animation-delay: 0.7s; }@keyframes unwind {
            0% { stroke-dashoffset: 100; }
            50% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -100; }
        }
        .animate-unwind {
            stroke-dasharray: 100;
            animation: unwind 3s linear infinite;
        }
    </style>

<script>
        // Simple parallax effect on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const background = document.querySelector('.bg-cover');
            if(background) {
                background.style.transform = `scale(1.05) translateY(${scrolled * 0.5}px)`;
            }
        });
    </script>
